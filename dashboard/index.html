    // ── Cookie-file → platform mapping (mirrors fetcher.py PLATFORMS) ──────────
    // Used client-side to detect which platforms are present in a credentials.json

    const COOKIE_FILE_TO_PLATFORM = {
      "claude.ai_cookies.txt":               "claude",
      "chatgpt.com_cookies.txt":             "codex",
      "www.trae.ai_cookies.txt":             "trae",
      "platform.minimaxi.com_cookies.txt":   "minimax",
      "www.kimi.com_cookies.txt":            "kimi",
      "platform.deepseek.com_cookies.txt":   "deepseek",
    };

    /**
     * Given a parsed credentials.json object, return the set of platform IDs
     * whose cookies or headers are present and non-empty in the file.
     */
    function detectPlatformsInJson(data) {
      const found = new Set();
      for (const [filename, text] of Object.entries(data.cookies || {})) {
        if (text && text.trim() && COOKIE_FILE_TO_PLATFORM[filename]) {
          found.add(COOKIE_FILE_TO_PLATFORM[filename]);
        }
      }
      // Headers can also signal a platform (e.g. claude-header.txt)
      for (const filename of Object.keys(data.headers || {})) {
        const base = filename.replace(/-header\.txt$/, "").replace(/-\w+\.txt$/, "");
        if (allPlatforms.find(p => p.id === base)) found.add(base);
      }
      return found;
    }

    let allPlatforms   = [];   // from GET /api/platforms
    let latestResults  = [];   // from GET /api/usage
    let refreshTimer   = null;
    let modalScreen    = null; // 'picker' | 'setup' | 'success' | 'details'
    let setupTarget    = null; // platform id in setup wizard

    // ── Init ───────────────────────────────────────────────────────────────────

    async function init() {
      await loadPlatforms();
      const enabled = allPlatforms.filter(p => p.enabled);
      if (enabled.length === 0) {
        showEmptyState();
      } else {
        await loadUsage();
        startRefreshTimer();
      }
    }

    async function loadPlatforms() {
      try {
        const r = await fetch("/api/platforms");
        allPlatforms = await r.json();
      } catch(e) {
        allPlatforms = [];
      }
    }

    async function loadUsage(force = false) {
      document.getElementById("btnRefresh").disabled = true;
      document.getElementById("status").textContent = force ? t("statusRefreshing") : t("statusLoading");
      try {
        const r = await fetch(force ? "/api/refresh" : "/api/usage", {
          method: force ? "POST" : "GET",
        });
        latestResults = await r.json();
        latestResults.sort((a, b) =>
          PLATFORM_ORDER.indexOf(a.platform) - PLATFORM_ORDER.indexOf(b.platform)
        );
        renderGrid();
        document.getElementById("status").textContent =
          `${t("statusUpdated")} ${new Date().toLocaleTimeString()}`;
      } catch(e) {
        document.getElementById("status").textContent = t("statusFailed");
      }
      document.getElementById("btnRefresh").disabled = false;
    }

    function startRefreshTimer() {
      clearInterval(refreshTimer);
      refreshTimer = setInterval(() => loadUsage(), 30000);
    }

    // ── Layout helpers ─────────────────────────────────────────────────────────

    function showEmptyState() {
      document.getElementById("emptyState").classList.remove("hidden");
      document.getElementById("emptyState").classList.add("flex");
      document.getElementById("grid").innerHTML = "";
      document.getElementById("btnRefresh").disabled = true;
      document.getElementById("status").textContent = t("statusNone");
    }

    function hideEmptyState() {
      document.getElementById("emptyState").classList.add("hidden");
      document.getElementById("emptyState").classList.remove("flex");
      document.getElementById("btnRefresh").disabled = false;
    }

    // ── Card rendering ─────────────────────────────────────────────────────────

    const ANTIGRAVITY_ORDER = [
      "Gemini 3.5 Flash (High)", "Gemini 3.5 Flash (Medium)",
      "Gemini 3.1 Pro (High)",   "Gemini 3.1 Pro (Low)",
      "Claude Opus 4.6 (Thinking)", "Claude Sonnet 4.6 (Thinking)",
      "GPT-OSS 120B (Medium)",
    ];

    function orderedMetrics(result) {
      if (result.platform !== "antigravity" && result.platform !== "antigravity_ide") return result.metrics;
      return [...result.metrics].sort((a, b) => {
        const ai = ANTIGRAVITY_ORDER.indexOf(a.label);
        const bi = ANTIGRAVITY_ORDER.indexOf(b.label);
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      });
    }

    function pct(m) {
      if (m.unit === "%" && m.total === 100) return m.used;
      if (m.total) return (m.used / m.total) * 100;
      return 0;
    }

    function barColor(v) {
      if (v >= 95) return "bg-red-500";
      if (v >= 80) return "bg-amber-400";
      return "bg-emerald-400";
    }

    function fmtValue(m) {
      if (m.unit === "$")       return m.total == null ? `+$${(+m.used).toFixed(2)}` : `$${(+m.used).toFixed(2)} / $${(+m.total).toFixed(2)}`;
      if (m.unit === "CNY")     return `¥${(+m.used).toFixed(2)} CNY`;
      if (m.unit === "次")      return `${(+m.used).toLocaleString()} ${lang === "en" ? "reqs" : "次"}`;
      if (m.unit === "tokens")  return `${(+m.used).toLocaleString()} tokens`;
      if (m.unit === "credits") return `${(+m.used).toLocaleString()} credits`;
      if (m.total && m.total !== 100) return `${(+m.used).toFixed(0)} / ${(+m.total).toFixed(0)}`;
      return `${(+m.used).toFixed(1)}%`;
    }

    function resetTxt(v) {
      if (!v) return "";
      const d = new Date(v);
      return isNaN(d) ? "" : `${t("resetPrefix")} ${d.toLocaleString()}`;
    }

    // ── Metric label translation ────────────────────────────────────────────────
    // Server always returns Chinese labels; map them to English when lang === "en".

    const LABEL_ZH_TO_EN = {
      "5小时用量":  "5-hour Usage",
      "本周用量":   "Weekly Usage",
      "充值余额":   "Balance",
      "本月消费":   "Monthly Spend",
      "当前余额":   "Balance",
      "累计消费":   "Total Spent",
      "累计充值":   "Total Credits",
      "套餐":      "Plan",
      "本月请求":  "Monthly Requests",
      "套餐用量":  "Plan Usage",
      "按需消费":  "On-Demand Spend",
    };

    // Dynamic suffix replacements for labels like "GPT-4o 请求次数" or "GPT-4 用量"
    const LABEL_SUFFIX_ZH_TO_EN = [
      ["请求次数", "Requests"],
      [" 用量",   " Usage"],
    ];

    function translateLabel(label) {
      if (lang !== "en") return label;
      if (LABEL_ZH_TO_EN[label]) return LABEL_ZH_TO_EN[label];
      for (const [zh, en] of LABEL_SUFFIX_ZH_TO_EN) {
        if (label.endsWith(zh)) return label.slice(0, -zh.length) + en;
      }
      return label; // already English (Basic, Bonus, AI Credits, model names…)
    }

    function metricHtml(m) {
      const v = Math.max(0, Math.min(100, pct(m)));
      return `
        <div class="space-y-2">
          <div class="flex items-baseline justify-between gap-3">
            <span class="text-sm text-zinc-300">${translateLabel(m.label)}</span>
            <span class="text-sm font-semibold text-zinc-50">${fmtValue(m)}</span>
          </div>
          ${m.total != null ? `
            <div class="relative h-2 overflow-hidden rounded-sm bg-zinc-800">
              <div class="h-full ${barColor(v)}" style="width:${v}%"></div>
            </div>` : ""}
          <div class="min-h-5 text-xs text-zinc-500">${resetTxt(m.reset_time)}</div>
        </div>`;
    }

    function cardHtml(result) {
      // For platforms with many metrics, show a subset + "View" button
      const hasDetails =
        (result.platform === "deepseek" && result.metrics.some(m => m.unit === "次" || m.unit === "tokens")) ||
        ((result.platform === "antigravity" || result.platform === "antigravity_ide") && result.metrics.length > 2);

      const detailsBtn = hasDetails ? `
        <button class="mt-4 inline-flex h-8 items-center rounded-md border border-zinc-700 px-3 text-xs font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100"
          type="button" onclick="openDetails('${result.platform}')">${t("cardViewBtn")} →</button>` : "";

      // Which metrics to show in card preview
      let previewMetrics;
      if (result.platform === "deepseek") {
        previewMetrics = result.metrics.filter(m => m.unit !== "次" && m.unit !== "tokens");
      } else if (result.platform === "antigravity" || result.platform === "antigravity_ide") {
        const all = orderedMetrics(result);
        const featured = all.filter(m => m.label.includes("Flash"));
        previewMetrics = featured.length ? featured : all.slice(0, 2);
      } else {
        previewMetrics = result.metrics;
      }

      const errorHtml = result.error
        ? `<div class="rounded-md border border-red-900/60 bg-red-950/40 p-3 text-sm text-red-200">${result.error}</div>`
        : "";

      // Determine if this platform needs JSON import (not local_app)
      const platformInfo = allPlatforms.find(p => p.id === result.platform);
      const needsImport = platformInfo && platformInfo.type !== "local_app";

      return `
        <article class="group relative rounded-lg border border-zinc-800 bg-zinc-900/60 p-4">
          <!-- Hover action buttons (top-right) -->
          <div style="position:absolute;right:12px;top:12px;display:none;" class="card-actions items-center gap-1.5">
            ${needsImport ? `<button
              onclick="openReimport('${result.platform}', '${result.display_name}')"
              class="h-6 inline-flex items-center justify-center rounded-md border border-zinc-700 px-1.5 text-xs text-zinc-500 hover:border-indigo-600 hover:text-indigo-400"
              type="button" title="${t('cardReimportTitle')}">↑</button>` : ''}
            <button
              onclick="confirmRemove('${result.platform}', '${result.display_name}')"
              class="h-6 w-6 inline-flex items-center justify-center rounded-md border border-zinc-700 text-xs text-zinc-500 hover:border-red-700 hover:text-red-400"
              type="button" title="${t('cardRemoveTitle')}">✕</button>
          </div>

          <!-- Card header -->
          <div class="mb-4 flex items-center gap-3">
            <img class="h-9 w-9 rounded-md bg-zinc-800 object-cover shrink-0" src="${LOGOS[result.platform] || ''}" alt="" />
            <div class="min-w-0">
              <h2 class="truncate text-base font-semibold">${result.display_name}</h2>
              <p class="text-xs text-zinc-500">${new Date(result.last_updated).toLocaleString()}</p>
            </div>
            ${hasDetails ? `<button
              onclick="openDetails('${result.platform}')"
              class="ml-2 shrink-0 inline-flex h-7 items-center rounded-md border border-zinc-700 px-2.5 text-xs font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100"
              type="button">${t("cardViewBtn")} →</button>` : ''}
          </div>

          <!-- Metrics -->
          <div class="space-y-4">
            ${errorHtml}
            ${previewMetrics.length ? previewMetrics.map(metricHtml).join("") : (!result.error ? `<p class="text-sm text-zinc-400">${t("cardNoData")}</p>` : '')}
          </div>
        </article>`;
    }

    function renderGrid() {
      const enabled = allPlatforms.filter(p => p.enabled).map(p => p.id);
      if (enabled.length === 0) { showEmptyState(); return; }

      hideEmptyState();
      const grid = document.getElementById("grid");
      grid.innerHTML = latestResults.map(cardHtml).join("");

      // Wire up hover visibility for card action buttons (✕ / ↑)
      grid.querySelectorAll("article").forEach(card => {
        const actions = card.querySelector(".card-actions");
        if (!actions) return;
        card.addEventListener("mouseenter", () => actions.style.display = "inline-flex");
        card.addEventListener("mouseleave", () => actions.style.display = "none");
      });
    }

    // ── Details modal (for deepseek / antigravity extra metrics) ───────────────

    function openDetails(platform) {
      const result = latestResults.find(r => r.platform === platform);
      if (!result) return;
      modalScreen = "details";
      openModal(result.display_name + t("detailsSuffix"));
      document.getElementById("modalBack").classList.add("hidden");
      document.getElementById("modalBody").innerHTML = `
        <div class="space-y-4">
          ${orderedMetrics(result).map(metricHtml).join("")}
        </div>`;
    }

    // ── Remove confirmation ────────────────────────────────────────────────────

    function confirmRemove(platformId, displayName) {
      modalScreen = "confirm_remove";
      openModal(t("removeTitle"));
      document.getElementById("modalBack").classList.add("hidden");
      document.getElementById("modalBody").innerHTML = `
        <p class="text-zinc-300 mb-6">${t("removeConfirm")} <strong>${displayName}</strong>${t("removeConfirm2")}</p>
        <div class="flex gap-3">
          <button onclick="removePlatform('${platformId}')"
            class="flex-1 rounded-md bg-red-600 py-2 text-sm font-semibold text-white hover:bg-red-500">
            ${t("removeBtn")}</button>
          <button onclick="closeModal()"
            class="flex-1 rounded-md border border-zinc-700 py-2 text-sm font-medium text-zinc-300 hover:bg-zinc-900">
            ${t("cancelBtn")}</button>
        </div>`;
    }

    async function removePlatform(platformId) {
      await fetch(`/api/platforms/${platformId}`, { method: "DELETE" });
      closeModal();
      await loadPlatforms();
      const enabled = allPlatforms.filter(p => p.enabled);
      if (enabled.length === 0) { showEmptyState(); }
      else { await loadUsage(); }
    }

    // ── Platform picker (multi-select) ─────────────────────────────────────────

    // Track which plugin-based platforms are selected in the picker
    let pickerSelected = new Set();

    function openPlatformPicker() {
      modalScreen = "picker";
      pickerSelected = new Set();
      openModal(t("modalPickerTitle"));
      document.getElementById("modalBack").classList.add("hidden");
      renderPickerBody();
    }

    function renderPickerBody() {
      const enabledIds  = new Set(allPlatforms.filter(p => p.enabled).map(p => p.id));
      const localApps   = allPlatforms.filter(p => p.type === "local_app");
      const apiKeyPlats = allPlatforms.filter(p => p.type === "api_key");
      const needsPlugin = allPlatforms.filter(p => p.type !== "local_app" && p.type !== "api_key");

      function localCard(p) {
        const already = enabledIds.has(p.id);
        return `
          <button type="button"
            onclick="${already ? '' : `openSetupWizard('${p.id}')`}"
            ${already ? 'disabled' : ''}
            class="flex flex-col items-center gap-2 rounded-lg border p-3 text-center transition
              ${already
                ? 'border-zinc-700 opacity-40 cursor-not-allowed'
                : 'border-zinc-700 hover:border-indigo-500 hover:bg-zinc-900 cursor-pointer'}">
            <img src="${LOGOS[p.id] || ''}" class="h-10 w-10 rounded-lg bg-zinc-800 object-cover" alt="" />
            <span class="text-xs font-medium text-zinc-200">${p.display_name}</span>
            ${already ? `<span class="text-xs text-zinc-500">${t("platformAdded")}</span>` : ''}
          </button>`;
      }

      function pluginCard(p) {
        const already   = enabledIds.has(p.id);
        const selected  = pickerSelected.has(p.id);
        if (already) {
          return `
            <div class="flex flex-col items-center gap-2 rounded-lg border border-zinc-700 p-3 text-center opacity-40 cursor-not-allowed">
              <img src="${LOGOS[p.id] || ''}" class="h-10 w-10 rounded-lg bg-zinc-800 object-cover" alt="" />
              <span class="text-xs font-medium text-zinc-200">${p.display_name}</span>
              <span class="text-xs text-zinc-500">${t("platformAdded")}</span>
            </div>`;
        }
        return `
          <button type="button" onclick="togglePickerSelect('${p.id}')"
            class="relative flex flex-col items-center gap-2 rounded-lg border p-3 text-center transition cursor-pointer
              ${selected
                ? 'border-indigo-500 bg-indigo-950/40 ring-1 ring-indigo-500'
                : 'border-zinc-700 hover:border-indigo-400 hover:bg-zinc-900'}">
            ${selected ? `<span class="absolute right-2 top-2 flex h-4 w-4 items-center justify-center rounded-full bg-indigo-500 text-white text-[10px] font-bold">✓</span>` : ''}
            <img src="${LOGOS[p.id] || ''}" class="h-10 w-10 rounded-lg bg-zinc-800 object-cover" alt="" />
            <span class="text-xs font-medium text-zinc-200">${p.display_name}</span>
          </button>`;
      }

      const anySelected = pickerSelected.size > 0;

      function apiKeyCard(p) {
        const already = enabledIds.has(p.id);
        return `
          <button type="button"
            onclick="${already ? '' : `openSetupWizard('${p.id}')`}"
            ${already ? 'disabled' : ''}
            class="flex flex-col items-center gap-2 rounded-lg border p-3 text-center transition
              ${already
                ? 'border-zinc-700 opacity-40 cursor-not-allowed'
                : 'border-zinc-700 hover:border-indigo-500 hover:bg-zinc-900 cursor-pointer'}">
            <img src="${LOGOS[p.id] || ''}" class="h-10 w-10 rounded-lg bg-zinc-800 object-cover" alt="" />
            <span class="text-xs font-medium text-zinc-200">${p.display_name}</span>
            ${already ? `<span class="text-xs text-zinc-500">${t("platformAdded")}</span>` : ''}
          </button>`;
      }

      document.getElementById("modalBody").innerHTML = `
        <div class="space-y-5">
          <div>
            <p class="mb-2 text-xs font-semibold uppercase tracking-widest text-zinc-500">${t("modalLocalSection")}</p>
            <div class="grid grid-cols-3 gap-3">${localApps.map(localCard).join("")}</div>
          </div>
          <div>
            <p class="mb-2 text-xs font-semibold uppercase tracking-widest text-zinc-500">${t("modalApiKeySection")}</p>
            <div class="grid grid-cols-3 gap-3">${apiKeyPlats.map(apiKeyCard).join("")}</div>
          </div>
          <div>
            <p class="mb-2 text-xs font-semibold uppercase tracking-widest text-zinc-500">${t("modalPluginSection")}</p>
            <p class="mb-3 text-xs text-zinc-500">${t("pickerSelectHint")}</p>
            <div class="grid grid-cols-3 gap-3">${needsPlugin.map(pluginCard).join("")}</div>
          </div>
          ${anySelected ? `
          <div class="pt-1">
            <button type="button" onclick="openBatchSetup()"
              class="w-full rounded-md bg-indigo-600 py-2.5 text-sm font-semibold text-white hover:bg-indigo-500">
              ${t("pickerNextBtn")} (${pickerSelected.size})
            </button>
          </div>` : ''}
        </div>`;
    }

    function togglePickerSelect(platformId) {
      if (pickerSelected.has(platformId)) {
        pickerSelected.delete(platformId);
      } else {
        pickerSelected.add(platformId);
      }
      renderPickerBody();
    }

    // Batch setup: show a single upload UI for all selected plugin platforms
    function openBatchSetup() {
      if (pickerSelected.size === 0) return;
      modalScreen = "batch_setup";
      openModal(t("step3Title"));
      document.getElementById("modalBack").classList.remove("hidden");
      renderBatchUploadBody();
    }

    function renderBatchUploadBody() {
      document.getElementById("modalBody").innerHTML = `
        <div class="space-y-5">
          <p class="text-sm text-zinc-400">${t("reimportDesc")}</p>
          <!-- Drop zone -->
          <div id="dropZone"
            class="relative flex flex-col items-center justify-center gap-2 rounded-lg border-2 border-dashed
                   border-zinc-700 bg-zinc-900/40 px-4 py-8 text-center
                   hover:border-indigo-500 hover:bg-zinc-900/70 transition cursor-pointer"
            onclick="document.getElementById('fileInput').click()"
            ondragover="event.preventDefault(); this.classList.add('border-indigo-500')"
            ondragleave="this.classList.remove('border-indigo-500')"
            ondrop="handleDrop(event)">
            <div class="text-2xl opacity-40">📂</div>
            <p class="text-sm text-zinc-400">${t("dropText")}</p>
            <p class="text-xs text-zinc-600">${t("dropOr")}</p>
            <input id="fileInput" type="file" accept=".json,application/json" class="hidden"
              onchange="handleFileSelect(event)" />
          </div>
          <div id="uploadResult" class="mt-3"></div>
        </div>`;
    }

    // ── Setup wizard ───────────────────────────────────────────────────────────

    function openSetupWizard(platformId) {
      setupTarget = platformId;
      modalScreen = "setup";
      const guides = getGuides();
      const guide = guides[platformId] || {};
      const p = allPlatforms.find(x => x.id === platformId);
      openModal(`${lang === "zh" ? "添加" : "Add"} ${p ? p.display_name : platformId}`);
      document.getElementById("modalBack").classList.remove("hidden");

      if (guide.type === "local_app") {
        renderLocalAppSetup(platformId, guide);
      } else if (guide.type === "api_key") {
        renderApiKeySetup(platformId);
      } else {
        renderPluginSetup(platformId, guide);
      }
    }

    function renderApiKeySetup(platformId) {
      document.getElementById("modalBody").innerHTML = `
        <div class="space-y-4">

          <!-- Step 1: Create key -->
          <div class="flex gap-3">
            <div class="flex h-7 w-7 shrink-0 items-center justify-center rounded-full bg-indigo-600 text-xs font-bold">1</div>
            <div class="pt-0.5">
              <p class="text-sm font-medium text-zinc-200">${t("orStep1Title")}</p>
              <p class="mt-1 text-xs text-zinc-500">${t("orStep1Desc")}</p>
              <p class="mt-2 rounded-md border border-amber-800/50 bg-amber-950/40 px-3 py-2 text-xs text-amber-300">${t("orStep1Note")}</p>
            </div>
          </div>

          <!-- Security note -->
          <div class="rounded-md border border-zinc-700 bg-zinc-900/60 px-3 py-2 text-xs text-zinc-400">
            ${t("orSecurityNote")}
          </div>

          <!-- Step 2: Paste key -->
          <div class="flex gap-3">
            <div class="flex h-7 w-7 shrink-0 items-center justify-center rounded-full bg-indigo-600 text-xs font-bold">2</div>
            <div class="w-full pt-0.5">
              <p class="mb-2 text-sm font-medium text-zinc-200">${lang === "zh" ? "粘贴 Management Key" : "Paste your Management Key"}</p>
              <input id="orApiKeyInput" type="password"
                placeholder="${t("orKeyPlaceholder")}"
                class="w-full rounded-md border border-zinc-700 bg-zinc-900 px-3 py-2 text-sm text-zinc-100
                       placeholder-zinc-600 focus:border-indigo-500 focus:outline-none" />
              <div id="orKeyError" class="mt-2 hidden text-xs text-red-400"></div>
            </div>
          </div>

          <button id="orSaveBtn" type="button" onclick="saveOpenRouterKey()"
            class="w-full rounded-md bg-indigo-600 py-2.5 text-sm font-semibold text-white hover:bg-indigo-500">
            ${t("orSaveBtn")}
          </button>
        </div>`;
    }

    async function saveOpenRouterKey() {
      const input = document.getElementById("orApiKeyInput");
      const errEl = document.getElementById("orKeyError");
      const btn   = document.getElementById("orSaveBtn");
      const key   = (input?.value || "").trim();

      errEl.classList.add("hidden");
      if (!key.startsWith("sk-or-")) {
        errEl.textContent = t("orKeyError");
        errEl.classList.remove("hidden");
        return;
      }

      btn.disabled = true;
      btn.textContent = t("orSavingBtn");
      try {
        const r = await fetch("/api/platforms/openrouter/apikey", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ api_key: key }),
        });
        if (r.ok) {
          await loadPlatforms();
          showSetupSuccess(["openrouter"]);
        } else {
          const err = await r.json().catch(() => ({}));
          errEl.textContent = err.detail || t("orSaveError");
          errEl.classList.remove("hidden");
          btn.disabled = false;
          btn.textContent = t("orSaveBtn");
        }
      } catch(e) {
        errEl.textContent = t("orSaveError");
        errEl.classList.remove("hidden");
        btn.disabled = false;
        btn.textContent = t("orSaveBtn");
      }
    }

    function renderLocalAppSetup(platformId, guide) {
      document.getElementById("modalBody").innerHTML = `
        <div class="space-y-5">
          <div class="rounded-lg border border-zinc-800 bg-zinc-900/50 p-4 text-sm leading-relaxed text-zinc-300">
            <p>${guide.desc}</p>
            ${guide.note ? `<p class="mt-2 text-zinc-400">${guide.note}</p>` : ''}
          </div>
          ${guide.downloadUrl ? `
            <a href="${guide.downloadUrl}" target="_blank"
               class="inline-flex items-center gap-1.5 text-sm text-indigo-400 hover:text-indigo-300">
              ${guide.downloadText} ↗
            </a>` : ''}
          <div id="detectResult"></div>
          <button id="btnDetect" type="button" onclick="detectLocalApp('${platformId}')"
            class="w-full rounded-md bg-indigo-600 py-2.5 text-sm font-semibold text-white hover:bg-indigo-500">
            ${t("detectBtn")}

        </div>`;
    }

    async function detectLocalApp(platformId) {
      const btn = document.getElementById("btnDetect");
      const result = document.getElementById("detectResult");

          showSetupSuccess([platformId]);

        result.innerHTML = `<div class="rounded-md border border-red-900/60 bg-red-950/40 p-3 text-sm text-red-200">${t("detectFail")}</div>`;

        btn.textContent = t("redetectBtn");

    function renderPluginSetup(platformId, guide) {
      document.getElementById("modalBody").innerHTML = `
        <div class="space-y-5">

          <!-- Step 1: Install extension -->
          <div class="flex gap-3">
            <div class="flex h-7 w-7 shrink-0 items-center justify-center rounded-full bg-indigo-600 text-xs font-bold">1</div>

              <p class="text-sm font-medium text-zinc-200">${t("step3Title")}</p>

              <!-- Drop zone -->
              <div id="dropZone"
                class="relative flex flex-col items-center justify-center gap-2 rounded-lg border-2 border-dashed
                       border-zinc-700 bg-zinc-900/40 px-4 py-8 text-center
                       hover:border-indigo-500 hover:bg-zinc-900/70 transition cursor-pointer"

                ondrop="handleDrop(event)">
                <div class="text-2xl opacity-40">📂</div>
                <p class="text-sm text-zinc-400">${t("dropText")}</p>
                <p class="text-xs text-zinc-600">${t("dropOr")}</p>
                <input id="fileInput" type="file" accept=".json,application/json" class="hidden"

              <div id="uploadResult" class="mt-3"></div>

    // ── Re-import existing platform ─────────────────────────────────────────────

    function openReimport(platformId, displayName) {
      // API-key platforms use the key setup wizard instead of file upload
      if (platformId === "openrouter") {
        openSetupWizard(platformId);
        return;
      }
      modalScreen = "reimport";
      setupTarget = platformId;
      openModal(t("reimportTitle"));
      document.getElementById("modalBack").classList.add("hidden");
      document.getElementById("modalBody").innerHTML = `
        <div class="space-y-5">
          <div class="rounded-lg border border-zinc-800 bg-zinc-900/50 p-4 text-sm text-zinc-300">
            <p class="font-medium mb-1">${displayName}</p>
            <p class="text-zinc-400">${t("reimportDesc")}</p>
          </div>

          <!-- Drop zone -->
          <div id="dropZone"
            class="relative flex flex-col items-center justify-center gap-2 rounded-lg border-2 border-dashed
                   border-zinc-700 bg-zinc-900/40 px-4 py-8 text-center
                   hover:border-indigo-500 hover:bg-zinc-900/70 transition cursor-pointer"
            onclick="document.getElementById('fileInput').click()"
            ondragover="event.preventDefault(); this.classList.add('border-indigo-500')"
            ondragleave="this.classList.remove('border-indigo-500')"
            ondrop="handleDrop(event)">
            <div class="text-2xl opacity-40">📂</div>
            <p class="text-sm text-zinc-400">${t("dropText")}</p>
            <p class="text-xs text-zinc-600">${t("dropOr")}</p>
            <input id="fileInput" type="file" accept=".json,application/json" class="hidden"
              onchange="handleFileSelect(event)" />
          </div>
          <div id="uploadResult"></div>
        </div>`;
    }

    // ── File upload ────────────────────────────────────────────────────────────

    // Holds the pending File object between the "detect" and "confirm" steps
    let pendingCredFile = null;

    function handleDrop(event) {
      event.preventDefault();
      document.getElementById("dropZone").classList.remove("border-indigo-500");
      const file = event.dataTransfer.files[0];
      if (file) readAndConfirmCredentials(file);
    }

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (file) readAndConfirmCredentials(file);
    }

    /**
     * Step 1 — Read the JSON client-side, detect platforms, show confirmation UI.
     */
    async function readAndConfirmCredentials(file) {
      const resultEl = document.getElementById("uploadResult");
      resultEl.innerHTML = `<p class="text-sm text-zinc-400">${t("importing")}</p>`;

      let data;
      try {
        const text = await file.text();
        data = JSON.parse(text);
      } catch(e) {
        resultEl.innerHTML = `<div class="rounded-md border border-red-900/60 bg-red-950/40 p-3 text-sm text-red-200">JSON 格式错误</div>`;
        return;
      }

      const foundInJson = detectPlatformsInJson(data);
      if (foundInJson.size === 0) {
        // Nothing recognisable → skip selection, upload directly
        pendingCredFile = file;
        await doUploadCredentials(file, null);
        return;
      }

      pendingCredFile = file;
      showPlatformConfirmStep(foundInJson);
    }

    /**
     * Step 2 — Render the platform-selection confirmation UI inside the modal body.
     * Called after detecting which platforms are in the JSON.
     *
     * Two distinct modes:
     *
     * A) Picker flow (pickerSelected is non-empty):
     *    Show ONLY platforms the user explicitly chose in the picker.
     *    All of them are pre-checked. Platforms not in pickerSelected are
     *    never shown, even if their cookies exist in the JSON.
     *
     * B) Re-import flow (pickerSelected is empty):
     *    Show everything found in the JSON.
     *    Pre-check: enabled (being refreshed) + new platforms not in removed list.
     *    Previously removed platforms are unchecked by default.
     */
    function showPlatformConfirmStep(foundInJson) {
      const enabledIds = new Set(allPlatforms.filter(p => p.enabled).map(p => p.id));
      const removedIds = new Set(allPlatforms.filter(p => p.removed).map(p => p.id));

      let platforms;
      let defaultChecked;

      if (pickerSelected.size > 0) {
        // Picker flow: only show what the user deliberately selected
        platforms = allPlatforms.filter(p => pickerSelected.has(p.id) && foundInJson.has(p.id));
        // Default = all selected (user already made the choice in the picker)
        defaultChecked = new Set(platforms.map(p => p.id));
      } else {
        // Re-import flow: show everything in the JSON
        platforms = allPlatforms.filter(p => foundInJson.has(p.id));
        // Pre-check: already enabled OR not previously removed
        defaultChecked = new Set(
          platforms.filter(p => enabledIds.has(p.id) || !removedIds.has(p.id)).map(p => p.id)
        );
      }

      // _confirmSelected is the live state toggled by user clicks
      window._confirmSelected = new Set(defaultChecked);

      renderConfirmList(platforms, enabledIds, removedIds);
      document.getElementById("modalTitle").textContent = t("confirmTitle");
    }

    /** Renders (or re-renders) the confirm list using the current _confirmSelected state. */
    function renderConfirmList(platforms, enabledIds, removedIds) {
      // If called after initial render, look up cached sets from DOM data attributes
      if (!platforms) {
        const listEl = document.getElementById("confirmList");
        if (!listEl) return;
        platforms = JSON.parse(listEl.dataset.platforms || "[]")
          .map(id => allPlatforms.find(p => p.id === id))
          .filter(Boolean);
        enabledIds = new Set(allPlatforms.filter(p => p.enabled).map(p => p.id));
        removedIds = new Set(allPlatforms.filter(p => p.removed).map(p => p.id));
      }

      function platformRow(p) {
        const checked = window._confirmSelected.has(p.id);
        let hint = t("confirmHintNew");
        let hintColor = "text-zinc-500";
        if (removedIds.has(p.id))       { hint = t("confirmHintRemoved"); hintColor = "text-amber-500"; }
        else if (enabledIds.has(p.id))  { hint = t("confirmHintActive");  hintColor = "text-emerald-500"; }

        return `
          <div onclick="toggleConfirmSelect('${p.id}')" role="checkbox" aria-checked="${checked}"
            class="flex items-center gap-3 rounded-lg border px-4 py-3 cursor-pointer transition select-none
              ${checked ? 'border-indigo-500 bg-indigo-950/30' : 'border-zinc-700 hover:border-zinc-600'}">
            <span class="flex h-5 w-5 shrink-0 items-center justify-center rounded border
              ${checked ? 'border-indigo-500 bg-indigo-500' : 'border-zinc-600 bg-transparent'}">
              ${checked ? '<svg viewBox="0 0 12 12" class="h-3 w-3 text-white"><polyline points="1,6 4,10 11,2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}
            </span>
            <img src="${LOGOS[p.id] || ''}" class="h-6 w-6 rounded bg-zinc-800 object-cover" alt="" />
            <span class="flex-1 text-sm font-medium text-zinc-200">${p.display_name}</span>
            <span class="text-xs ${hintColor}">${hint}</span>
          </div>`;
      }

      const listEl = document.getElementById("confirmList");
      if (listEl) {
        // Already rendered container — just update the rows
        listEl.innerHTML = platforms.map(platformRow).join("");
        listEl.dataset.platforms = JSON.stringify(platforms.map(p => p.id));
      } else {
        // First render — build the whole modal body
        document.getElementById("modalBody").innerHTML = `
          <div class="space-y-4">
            <p class="text-sm text-zinc-400">${t("confirmDesc")}</p>
            <div id="confirmList" class="space-y-2" data-platforms='${JSON.stringify(platforms.map(p => p.id))}'>
              ${platforms.map(platformRow).join("")}
            </div>
            <div id="confirmWarn" class="hidden">
              <p class="text-xs text-amber-400">${t("confirmNoneWarn")}</p>
            </div>
            <button type="button" onclick="submitConfirmedImport()"
              class="w-full rounded-md bg-indigo-600 py-2.5 text-sm font-semibold text-white hover:bg-indigo-500">
              ${t("confirmBtn")}
            </button>
          </div>`;
      }
    }

    function toggleConfirmSelect(platformId) {
      // Toggle in the live Set — this is the single source of truth
      if (window._confirmSelected.has(platformId)) {
        window._confirmSelected.delete(platformId);
      } else {
        window._confirmSelected.add(platformId);
      }
      // Re-render rows only (not the whole modal body)
      renderConfirmList(null);
      document.getElementById("confirmWarn")?.classList.add("hidden");
    }

    /**
     * Step 3 — User confirmed selection → upload with enable_only.
     */
    async function submitConfirmedImport() {
      if (window._confirmSelected.size === 0) {
        document.getElementById("confirmWarn")?.classList.remove("hidden");
        return;
      }
      if (!pendingCredFile) return;
      await doUploadCredentials(pendingCredFile, [...window._confirmSelected]);
    }

    /**
     * Core upload — sends file + optional enable_only list to server.
     */
    async function doUploadCredentials(file, enableOnly) {
      // Show a simple loading state (may have replaced modal body already)
      const modalBody = document.getElementById("modalBody");
      modalBody.innerHTML = `<p class="text-sm text-zinc-400 py-4 text-center">${t("importing")}</p>`;
      document.getElementById("modalTitle").textContent = t("importing").replace("…","");

      const formData = new FormData();
      formData.append("file", file);
      if (enableOnly !== null) {
        formData.append("enable_only", enableOnly.join(","));
      }

      try {
        const r = await fetch("/api/credentials/import", { method: "POST", body: formData });
        if (!r.ok) {
          const err = await r.json();
          modalBody.innerHTML = `<div class="rounded-md border border-red-900/60 bg-red-950/40 p-3 text-sm text-red-200">${err.detail}</div>`;
          return;
        }
        const data = await r.json();
        await loadPlatforms();
        showSetupSuccess(data.newly_enabled, data.ready_platforms || []);
      } catch(e) {
        modalBody.innerHTML = `<div class="rounded-md border border-red-900/60 bg-red-950/40 p-3 text-sm text-red-200">${t("uploadFail")}</div>`;
      }
    }

    // ── Setup success screen ───────────────────────────────────────────────────

    function showSetupSuccess(newlyEnabled, readyPlatforms = []) {
      modalScreen = "success";
      openModal(t("successTitle"));
      document.getElementById("modalBack").classList.add("hidden");

      const displayIds = newlyEnabled.length ? newlyEnabled : readyPlatforms;
      const names = displayIds.map(id => {
        const p = allPlatforms.find(x => x.id === id);
        return p ? p.display_name : id;
      });
      const title = newlyEnabled.length ? t("successEnabled") :
        (names.length ? t("successReady") : t("successNone"));
      const hint = newlyEnabled.length ? t("successHintNew") : t("successHintNone");

      document.getElementById("modalBody").innerHTML = `
        <div class="space-y-5">
          <div class="rounded-lg border border-emerald-900/50 bg-emerald-950/30 p-4">
            <p class="text-sm font-semibold text-emerald-300 mb-2">${title}</p>
            <ul class="space-y-1">
              ${names.map(n => `<li class="flex items-center gap-2 text-sm text-emerald-200"><span class="text-emerald-400">✓</span> ${n}</li>`).join("")}
            </ul>
          </div>
          <p class="text-xs text-zinc-500">${hint}</p>
          <button type="button" onclick="finishSetup()"
            class="w-full rounded-md bg-indigo-600 py-2.5 text-sm font-semibold text-white hover:bg-indigo-500">
            ${t("finishBtn")}
          </button>
        </div>`;
    }

    async function finishSetup() {
      closeModal();
      await loadPlatforms();
      hideEmptyState();
      // Wait briefly for background refresh tasks to populate cache, then reload
      setTimeout(() => loadUsage(), 1500);
    }

    // ── Modal helpers ──────────────────────────────────────────────────────────

    function openModal(title) {
      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modal").classList.remove("hidden");
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
      modalScreen = null;
      setupTarget = null;
    }

    // ── Event wiring ───────────────────────────────────────────────────────────

    document.getElementById("btnAdd").addEventListener("click", async () => {
      await loadPlatforms();
      openPlatformPicker();
    });
    document.getElementById("btnAddEmpty").addEventListener("click", async () => {
      await loadPlatforms();
      openPlatformPicker();
    });
    document.getElementById("btnRefresh").addEventListener("click", () => loadUsage(true));

    document.getElementById("modalClose").addEventListener("click", closeModal);
    document.getElementById("modalBackdrop").addEventListener("click", closeModal);

    document.getElementById("modalBack").addEventListener("click", () => {
      if (modalScreen === "setup")       openPlatformPicker();
      else if (modalScreen === "success") openPlatformPicker();
      else if (modalScreen === "batch_setup") openPlatformPicker();
    });

    document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

    // Language toggle
    document.getElementById("btnLang").addEventListener("click", () => {
      lang = lang === "zh" ? "en" : "zh";
      localStorage.setItem("dashboard_lang", lang);
      applyLang();
      // Re-render dynamic content that's currently visible
      const enabled = allPlatforms.filter(p => p.enabled);
      if (enabled.length === 0) {
        showEmptyState();
      } else {
        renderGrid();
        document.getElementById("status").textContent =
          latestResults.length
            ? `${t("statusUpdated")} ${new Date().toLocaleTimeString()}`
            : t("statusLoading");
      }
      // Re-render open modal if any
      if (modalScreen === "picker") openPlatformPicker();
    });

    // ── Boot ───────────────────────────────────────────────────────────────────

    applyLang();
    init();
    </script>
  </body>
</html>
