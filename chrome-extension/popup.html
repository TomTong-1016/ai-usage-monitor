<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Usage Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #0f1117;
      color: #e2e8f0;
      width: 340px;
      min-height: 360px;
    }

    .header {
      background: linear-gradient(135deg, #1a1d2e 0%, #0f1117 100%);
      border-bottom: 1px solid #2d3748;
      padding: 14px 16px 12px;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #f7fafc;
      letter-spacing: 0.01em;
    }
    .header p {
      font-size: 11px;
      color: #718096;
      margin-top: 2px;
    }

    .platforms {
      padding: 8px 0;
    }

    .platform-row {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      gap: 10px;
      transition: background 0.1s;
    }
    .platform-row:hover { background: #1a1d2e; }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #4a5568;
    }
    .dot.ready    { background: #48bb78; box-shadow: 0 0 6px #48bb7888; }
    .dot.partial  { background: #ed8936; box-shadow: 0 0 6px #ed893688; }
    .dot.missing  { background: #4a5568; }

    .platform-name {
      font-weight: 500;
      flex: 1;
      color: #e2e8f0;
    }
    .platform-status {
      font-size: 11px;
      color: #718096;
      text-align: right;
    }
    .platform-status.ready   { color: #68d391; }
    .platform-status.partial { color: #f6ad55; }
    .platform-status.hint    { color: #4a5568; font-style: italic; }

    .divider {
      height: 1px;
      background: #2d3748;
      margin: 4px 0;
    }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid #2d3748;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-export {
      width: 100%;
      padding: 9px 0;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    .btn-export:hover:not(:disabled)  { opacity: 0.9; transform: translateY(-1px); }
    .btn-export:active:not(:disabled) { transform: translateY(0); }
    .btn-export:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-refresh {
      width: 100%;
      padding: 6px 0;
      border-radius: 6px;
      border: 1px solid #2d3748;
      font-size: 12px;
      cursor: pointer;
      background: transparent;
      color: #718096;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-refresh:hover { border-color: #4a5568; color: #a0aec0; }

    .status-msg {
      font-size: 11px;
      text-align: center;
      color: #718096;
      min-height: 16px;
    }
    .status-msg.ok  { color: #68d391; }
    .status-msg.err { color: #fc8181; }

    .guide-box {
      background: #1a1d2e;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 10px 12px;
      margin: 0 16px 10px;
      font-size: 11px;
      color: #718096;
      line-height: 1.6;
    }
    .guide-box strong { color: #a0aec0; }
    .guide-box a { color: #667eea; text-decoration: none; }
    .guide-box a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <h1>AI Usage Monitor</h1>
    <p>导出凭据到本地 dashboard</p>
  </div>

  <div class="platforms" id="platforms">
    <!-- Populated by popup.js -->
  </div>

  <div class="guide-box" id="guideBox" style="display:none">
    <!-- Shown when some platforms need action -->
  </div>

  <div class="footer">
    <div class="status-msg" id="statusMsg"></div>
    <button class="btn-export" id="btnExport">导出 credentials.json</button>
    <button class="btn-refresh" id="btnRefresh">刷新状态</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
